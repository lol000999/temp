services:
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: always

    ports:
      - "3000:3000"
      - "222:22"

    volumes:
      - ./data:/data

    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=https://lol000999m-git.serverpit.com/
      - GITEA__server__DOMAIN=lol000999m-git.serverpit.com
